name: rex
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    branches:
jobs:
  build:
    env:
      PY_COLORS: "1"
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.13"]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install WARP
      run: |
        echo "Setting up Cloudflare WARP..."
        sudo apt-get -y update
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
        sudo apt-get update && sudo apt-get install -y --no-install-recommends cloudflare-warp
        sudo warp-cli --accept-tos registration new
        sudo warp-cli --accept-tos mode warp+doh
        sudo warp-cli --accept-tos connect
        sleep 5
      shell: bash

    - name: Ensure connection is WARP'ed
      run: |
        echo "Checking WARP connection..."
        curl -s https://www.cloudflare.com/cdn-cgi/trace | grep "warp=on"
      shell: bash

    - name: Set Locale
      run: |
        sudo apt-get install tzdata locales -y && sudo locale-gen en_US.UTF-8
        sudo localectl set-locale LANG="en_US.UTF-8"
        export LANG="en_US.UTF-8"
        sudo update-locale
        locale -a
        locale
        locale -c -k LC_NUMERIC
        localectl status

    # ─────────────────────────────────────────────────────────
    # Brave Browser Installation
    # ─────────────────────────────────────────────────────────
    - name: Install Brave Browser
      run: |
        echo "Installing Brave Browser..."
        sudo apt-get install -y curl software-properties-common apt-transport-https
        curl -fsSLo /usr/share/keyrings/brave-browser-archive-keyring.gpg \
          https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/brave-browser-archive-keyring.gpg] \
          https://brave-browser-apt-release.s3.brave.com/ stable main" \
          | sudo tee /etc/apt/sources.list.d/brave-browser-release.list
        sudo apt-get update
        sudo apt-get install -y brave-browser
      shell: bash

    - name: Verify Brave Installation
      run: |
        echo "--- Brave binary location ---"
        which brave-browser || which brave-browser-stable || echo "brave not on PATH"
        echo "--- Brave version ---"
        brave-browser --version || brave-browser-stable --version || echo "Could not determine version"
        echo "--- Brave binary exists check ---"
        ls -la /usr/bin/brave-browser* || true
        ls -la /opt/brave.com/ || true
      shell: bash

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade wheel
        pip install --upgrade seleniumbase
        pip install --upgrade pyautogui
        pip install --upgrade pymongo
        pip install --upgrade python-xlib

    - name: Install chromedriver
      run: |
        seleniumbase install chromedriver

    # ─────────────────────────────────────────────────────────
    # Pre-flight Tests (continue-on-error so they never break
    # the workflow, but still surface useful diagnostics)
    # ─────────────────────────────────────────────────────────
    - name: "Test: Python & package versions"
      continue-on-error: true
      run: |
        echo "=== Python ==="
        python --version
        echo ""
        echo "=== Installed packages ==="
        pip list 2>/dev/null | grep -iE "seleniumbase|pyautogui|pymongo|xlib"
        echo ""
        echo "=== SeleniumBase info ==="
        seleniumbase version 2>/dev/null || sbase version 2>/dev/null || echo "sbase CLI not available"
      shell: bash

    - name: "Test: Network connectivity & geolocation"
      continue-on-error: true
      run: |
        echo "=== Public IP ==="
        curl -sf https://ifconfig.me && echo ""
        echo ""
        echo "=== WARP status ==="
        curl -sf https://www.cloudflare.com/cdn-cgi/trace || echo "Could not reach Cloudflare trace"
        echo ""
        echo "=== Geo API ==="
        curl -sf http://ip-api.com/json/ | python -m json.tool || echo "Geo API unreachable"
      shell: bash

    - name: "Test: Brave headless smoke test"
      continue-on-error: true
      run: |
        echo "Launching Brave in headless mode to confirm it starts..."
        timeout 15 brave-browser \
          --headless=new \
          --no-sandbox \
          --disable-gpu \
          --disable-dev-shm-usage \
          --dump-dom \
          "https://example.com" 2>/dev/null \
        | head -20 \
        && echo "Brave headless smoke test PASSED" \
        || echo "Brave headless smoke test FAILED (non-blocking)"
      shell: bash

    - name: "Test: Xvfb display check"
      continue-on-error: true
      run: |
        echo "Checking if Xvfb can start a virtual display..."
        sudo apt-get install -y xvfb > /dev/null 2>&1 || true
        Xvfb :99 -screen 0 1920x1080x24 &
        XVFB_PID=$!
        sleep 2
        if kill -0 $XVFB_PID 2>/dev/null; then
          echo "Xvfb is running on :99 (PID $XVFB_PID)"
          export DISPLAY=:99
          echo "DISPLAY=$DISPLAY"
          echo "Xvfb test PASSED"
        else
          echo "Xvfb failed to start (non-blocking)"
        fi
        kill $XVFB_PID 2>/dev/null || true
      shell: bash

    - name: "Test: SeleniumBase basic Brave test"
      continue-on-error: true
      run: |
        python -c "
        from seleniumbase import SB
        import sys

        print('Attempting SeleniumBase + Brave quick test...')
        try:
            with SB(
                browser='chrome',
                headless=True,
                binary_location='/usr/bin/brave-browser',
                chromium_arg='--no-sandbox,--disable-dev-shm-usage',
            ) as sb:
                sb.open('https://example.com')
                title = sb.get_title()
                print(f'Page title: {title}')
                assert 'Example' in title, f'Unexpected title: {title}'
                print('SeleniumBase + Brave test PASSED')
        except Exception as e:
            print(f'SeleniumBase + Brave test FAILED (non-blocking): {e}')
            sys.exit(0)  # exit 0 so continue-on-error is doubly safe
        "
      shell: bash

    # ─────────────────────────────────────────────────────────
    # Main Run
    # ─────────────────────────────────────────────────────────
    - name: Run python rex.py --debug
      run: |
        python rex.py --brave --incognito --do-not-track --xvfb --screenshot
